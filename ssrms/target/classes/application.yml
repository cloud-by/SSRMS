server:
  port: ${SERVER_PORT:8090}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ssrms?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.ssrms.entity

ssrms:
  cors:
    allowed-origin-patterns: ${SSRMS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

coze:
  base-url: ${COZE_BASE_URL:https://api.coze.cn}
  bot-id: ${COZE_BOT_ID:}
  token: ${COZE_TOKEN:}
  connect-timeout-ms: ${COZE_CONNECT_TIMEOUT_MS:15000}
  read-timeout-ms: ${COZE_READ_TIMEOUT_MS:60000}
